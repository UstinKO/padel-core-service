databaseChangeLog:
  - changeSet:
      id: v1.14-update-owner-credentials
      author: padel-core

      changes:
        - sql:
            sql: |
              UPDATE owners_db
              SET email = 'secure.owner@padel-core.com',
                  password = '$2a$10$REPLACE_WITH_NEW_BCRYPT_HASH',
                  updated_at = CURRENT_TIMESTAMP
              WHERE email = 'owner@padel-core.com';