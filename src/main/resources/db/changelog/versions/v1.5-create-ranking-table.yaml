databaseChangeLog:
  - changeSet:
      id: v1.5-create-ranking-table
      author: padel-core
      changes:
        - createTable:
            tableName: ranking_db
            remarks: "Таблица рейтинга игроков"
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ranking_db
                    nullable: false
                  remarks: "Уникальный идентификатор записи рейтинга"

              - column:
                  name: player_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_ranking_player
                  remarks: "ID игрока (связь с player_padel_db)"

              - column:
                  name: puntos
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "Общее количество очков игрока"

              - column:
                  name: torneos_jugados
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "Количество сыгранных турниров"

              - column:
                  name: torneos_ganados
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "Количество выигранных турниров"

              - column:
                  name: partidos_ganados
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "Количество выигранных матчей"

              - column:
                  name: partidos_perdidos
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "Количество проигранных матчей"

              - column:
                  name: sets_ganados
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "Количество выигранных сетов"

              - column:
                  name: sets_perdidos
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: "Количество проигранных сетов"

              - column:
                  name: nivel_actual
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
                  remarks: "Текущий уровень игрока (C5, C6, C7, C8, C9)"

              - column:
                  name: posicion_anterior
                  type: INTEGER
                  constraints:
                    nullable: true
                  remarks: "Предыдущая позиция в рейтинге"

              - column:
                  name: posicion_actual
                  type: INTEGER
                  constraints:
                    nullable: true
                  remarks: "Текущая позиция в рейтинге"

              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Дата создания записи"

              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Дата последнего обновления"

        # Создаем индексы для оптимизации запросов
        - createIndex:
            indexName: idx_ranking_puntos
            tableName: ranking_db
            columns:
              - column:
                  name: puntos

        - createIndex:
            indexName: idx_ranking_nivel
            tableName: ranking_db
            columns:
              - column:
                  name: nivel_actual

        - createIndex:
            indexName: idx_ranking_player
            tableName: ranking_db
            columns:
              - column:
                  name: player_id
            unique: true

        - createIndex:
            indexName: idx_ranking_posicion
            tableName: ranking_db
            columns:
              - column:
                  name: posicion_actual

        # Добавляем внешний ключ к таблице игроков
        - addForeignKeyConstraint:
            baseTableName: ranking_db
            baseColumnNames: player_id
            referencedTableName: player_padel_db
            referencedColumnNames: id
            constraintName: fk_ranking_player
            onDelete: CASCADE
            onUpdate: CASCADE