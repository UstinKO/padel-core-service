databaseChangeLog:
  - changeSet:
      id: 8
      author: padel-core
      changes:
        - createTable:
            tableName: tournament_registrations_db
            remarks: "Таблица регистраций на турниры"
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_tournament_registrations
                    nullable: false
              - column:
                  name: tournament_id
                  type: BIGINT
                  constraints:
                    nullable: false
                  remarks: "ID турнира"
              - column:
                  name: player_id
                  type: BIGINT
                  constraints:
                    nullable: false
                  remarks: "ID игрока"
              - column:
                  name: registration_date
                  type: TIMESTAMP WITHOUT TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Дата регистрации"
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: "Статус регистрации (CONFIRMED, WAITLIST, CANCELLED)"
              - column:
                  name: position
                  type: INTEGER
                  constraints:
                    nullable: true
                  remarks: "Позиция в основном списке"
              - column:
                  name: partner_id
                  type: BIGINT
                  constraints:
                    nullable: true
                  remarks: "ID партнера (для парных турниров)"
              - column:
                  name: cancellation_date
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: true
                  remarks: "Дата отмены регистрации"
              - column:
                  name: cancellation_reason
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
                  remarks: "Причина отмены"
              - column:
                  name: waitlist_position
                  type: INTEGER
                  constraints:
                    nullable: true
                  remarks: "Позиция в листе ожидания"
              - column:
                  name: notified_about_vacancy
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: true
                  remarks: "Уведомлен ли о появлении места"
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: true
                  remarks: "Дата последнего обновления"
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
                  remarks: "Флаг активности записи"

        # Создаем уникальное ограничение
        - addUniqueConstraint:
            constraintName: uk_tournament_player
            tableName: tournament_registrations_db
            columnNames: tournament_id, player_id

        # Создаем индексы
        - createIndex:
            indexName: idx_reg_tournament_id
            tableName: tournament_registrations_db
            columns:
              - column:
                  name: tournament_id

        - createIndex:
            indexName: idx_reg_player_id
            tableName: tournament_registrations_db
            columns:
              - column:
                  name: player_id

        - createIndex:
            indexName: idx_reg_status
            tableName: tournament_registrations_db
            columns:
              - column:
                  name: status

        - createIndex:
            indexName: idx_reg_tournament_status
            tableName: tournament_registrations_db
            columns:
              - column:
                  name: tournament_id
              - column:
                  name: status

        - createIndex:
            indexName: idx_reg_waitlist_position
            tableName: tournament_registrations_db
            columns:
              - column:
                  name: waitlist_position
            where: status = 'WAITLIST'

        # Добавляем внешние ключи
        - addForeignKeyConstraint:
            baseTableName: tournament_registrations_db
            baseColumnNames: tournament_id
            referencedTableName: tournaments_db
            referencedColumnNames: id
            constraintName: fk_reg_tournament
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: tournament_registrations_db
            baseColumnNames: player_id
            referencedTableName: player_padel_db
            referencedColumnNames: id
            constraintName: fk_reg_player
            onDelete: CASCADE

  - changeSet:
      id: 9
      author: padel-core
      changes:
        - sql:
            dbms: postgresql
            sql: |
              COMMENT ON TABLE tournament_registrations_db IS 'Регистрации игроков на турниры';
              COMMENT ON COLUMN tournament_registrations_db.id IS 'Уникальный идентификатор регистрации';
              COMMENT ON COLUMN tournament_registrations_db.tournament_id IS 'ID турнира';
              COMMENT ON COLUMN tournament_registrations_db.player_id IS 'ID игрока';
              COMMENT ON COLUMN tournament_registrations_db.registration_date IS 'Дата и время регистрации';
              COMMENT ON COLUMN tournament_registrations_db.status IS 'Статус регистрации';
              COMMENT ON COLUMN tournament_registrations_db.position IS 'Позиция в основном списке';
              COMMENT ON COLUMN tournament_registrations_db.partner_id IS 'ID партнера по команде';
              COMMENT ON COLUMN tournament_registrations_db.cancellation_date IS 'Дата отмены';
              COMMENT ON COLUMN tournament_registrations_db.cancellation_reason IS 'Причина отмены';
              COMMENT ON COLUMN tournament_registrations_db.waitlist_position IS 'Позиция в листе ожидания';
              COMMENT ON COLUMN tournament_registrations_db.notified_about_vacancy IS 'Уведомлен о появлении места';