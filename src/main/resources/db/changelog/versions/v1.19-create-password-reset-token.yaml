databaseChangeLog:
  - changeSet:
      id: v1.19-create-password-reset-token
      author: padel-core
      comment: Create password_reset_tokens_db table for password recovery
      changes:
        - createTable:
            tableName: password_reset_tokens_db
            remarks: "Таблица для хранения токенов сброса пароля"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_password_reset_tokens
                  remarks: "Уникальный идентификатор"
              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_password_reset_token
                  remarks: "Уникальный токен для сброса пароля"
              - column:
                  name: player_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_password_reset_player
                    references: player_padel_db(id)
                  remarks: "ID игрока"
              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Дата истечения токена"
              - column:
                  name: used
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
                  remarks: "Флаг использования токена"
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Дата создания"
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: "Дата обновления"
      rollback:
        - dropTable:
            tableName: password_reset_tokens_db