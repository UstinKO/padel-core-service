databaseChangeLog:
  - changeSet:
      id: v1.0-create-player-table
      author: padle-team
      changes:
        - createTable:
            tableName: player_padel_db
            remarks: "Таблица игроков"
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_player_padel
                    nullable: false
              - column:
                  name: nombre
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: apellido
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: telefono
                  type: VARCHAR(20)
                  constraints:
                    unique: true
                    nullable: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: fecha_registro
                  type: TIMESTAMP WITHOUT TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: fecha_actualizacion
                  type: TIMESTAMP WITHOUT TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: email_confirmado
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: fecha_confirmacion_email
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: true
              - column:
                  name: codigo_confirmacion
                  type: VARCHAR(50)
                  constraints:
                    nullable: true
              - column:
                  name: activo
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_player_email
            tableName: player_padel_db
            columns:
              - column:
                  name: email
            unique: true

        - createIndex:
            indexName: idx_player_telefono
            tableName: player_padel_db
            columns:
              - column:
                  name: telefono
            unique: true

        - createIndex:
            indexName: idx_player_activo
            tableName: player_padel_db
            columns:
              - column:
                  name: activo

        - createIndex:
            indexName: idx_player_email_confirmado
            tableName: player_padel_db
            columns:
              - column:
                  name: email_confirmado