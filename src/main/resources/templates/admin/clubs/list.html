<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clubes - E-Padel Admin</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" th:href="@{/images/2.svg}">
    <link rel="alternate icon" th:href="@{/images/favicon.ico}">
    <link rel="apple-touch-icon" th:href="@{/images/apple-touch-icon.png}">

    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<!-- ✅ ИСПРАВЛЕНО: Управление клубами → Gestión de Clubes -->
<header th:replace="~{fragments/admin-header :: header('Gestión de Clubes')}"></header>

<main class="admin-main">
    <div class="container">
        <div class="admin-header">
            <h1 class="admin-title">
                <i class="fas fa-building"></i>
                Gestión de Clubes
            </h1>
            <!-- ✅ ИСПРАВЛЕНО: Администрирование клубов → Administración de clubes -->
            <p class="admin-subtitle">Administración de clubes E-Padel</p>
        </div>

        <!-- Сообщения об успехе/ошибке -->
        <div th:if="${successMessage}" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${successMessage}">Operación exitosa</span>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${errorMessage}">Error en la operación</span>
        </div>

        <!-- Кнопка создания нового клуба -->
        <div class="admin-actions">
            <a href="/admin/clubs/new" class="btn btn-primary">
                <i class="fas fa-plus-circle"></i>
                Nuevo Club
            </a>
        </div>

        <!-- Таблица клубов -->
        <div class="admin-table-container">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Ciudad/Zona</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="club : ${clubs}" th:if="${not #lists.isEmpty(clubs)}">
                    <td th:text="${club.id}">1</td>
                    <td>
                        <strong th:text="${club.nombre}">Club Padel</strong>
                    </td>
                    <td th:text="${club.zonaCiudad ?: '—'}">Madrid</td>
                    <td th:text="${club.telefonoContacto ?: '—'}">+34 912 345 678</td>
                    <td th:text="${club.emailContacto ?: '—'}">info@club.com</td>
                    <td>
                        <span class="status-badge" th:classappend="${club.isActive} ? 'badge-success' : 'badge-warning'"
                              th:text="${club.isActive} ? 'Activo' : 'Inactivo'">
                            Activo
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <a th:href="@{'/admin/clubs/' + ${club.id}}" class="btn-icon" title="Ver detalles">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a th:href="@{'/admin/clubs/' + ${club.id} + '/edit'}" class="btn-icon" title="Editar">
                                <i class="fas fa-edit"></i>
                            </a>
                            <form th:action="@{'/admin/clubs/' + ${club.id} + '/toggle-status'}"
                                  method="post"
                                  style="display: inline;">
                                <button type="submit" class="btn-icon"
                                        th:title="${club.isActive} ? 'Desactivar' : 'Activar'"
                                        th:classappend="${club.isActive} ? '' : 'success'">
                                    <i th:class="${club.isActive} ? 'fas fa-ban' : 'fas fa-check-circle'"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:unless="${not #lists.isEmpty(clubs)}">
                    <td colspan="7" style="text-align: center; padding: 3rem;">
                        <i class="fas fa-building" style="font-size: 3rem; color: var(--admin-gray); margin-bottom: 1rem;"></i>
                        <h3>No hay clubes</h3>
                        <p>Comienza creando tu primer club</p>
                        <a href="/admin/clubs/new" class="btn btn-primary">
                            <i class="fas fa-plus-circle"></i>
                            Crear Club
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/admin-footer :: footer}"></footer>


<script th:src="@{/js/admin.js}"></script>
</body>
</html>
