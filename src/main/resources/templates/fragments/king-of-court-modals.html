<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Модальное окно ввода результата -->
<div th:fragment="resultModal" id="resultModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 500px; padding: 2rem;">
        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 class="admin-title" style="font-size: 1.5rem; margin: 0;">
                <i class="fas fa-trophy"></i> Resultado para Cancha <span id="modalCourtNumber"></span>
            </h2>
            <button class="modal-close" onclick="window.kingOfCourt.closeResultModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div id="modalPlayersInfo" class="alert alert-info" style="margin-bottom: 1.5rem;">
            <!-- Информация о командах будет вставлена через JS -->
        </div>

        <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label class="form-label">Ganador 1</label>
                <select id="winner1" class="form-control" required></select>
            </div>

            <div class="form-group">
                <label class="form-label">Ganador 2</label>
                <select id="winner2" class="form-control" required></select>
            </div>

            <div class="form-group">
                <label class="form-label">Puntos ganadores</label>
                <input type="number" id="scoreWinners" class="form-control" min="0" required>
            </div>

            <div class="form-group">
                <label class="form-label">Puntos perdedores</label>
                <input type="number" id="scoreLosers" class="form-control" min="0" required>
            </div>
        </div>

        <p id="modalError" class="text-danger" style="color: #ef4444; margin-top: 1rem; display: none;"></p>

        <div class="modal-actions" style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button class="btn btn-outline" style="flex: 1;" onclick="window.kingOfCourt.closeResultModal()">Cancelar</button>
            <button class="btn btn-primary" style="flex: 1;" onclick="window.kingOfCourt.saveResult()">Guardar</button>
        </div>
    </div>
</div>

<!-- Модальное окно истории игрока -->
<div th:fragment="historyModal" id="historyModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 800px; padding: 2rem;">
        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 class="admin-title" style="font-size: 1.5rem; margin: 0;">
                <i class="fas fa-history"></i> Historial de: <span id="historyPlayerName"></span>
            </h2>
            <button class="modal-close" onclick="window.kingOfCourt.closeHistoryModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div style="max-height: 60vh; overflow-y: auto;">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Ronda</th>
                    <th>Cancha</th>
                    <th>Resultado</th>
                    <th>Marcador</th>
                    <th>Compañero</th>
                    <th>Rivales</th>
                </tr>
                </thead>
                <tbody id="historyTableBody">
                <!-- Данные будут вставлены через JS -->
                </tbody>
            </table>
        </div>

        <div class="modal-actions" style="margin-top: 1.5rem;">
            <button class="btn btn-outline" style="width: 100%;" onclick="window.kingOfCourt.closeHistoryModal()">Cerrar</button>
        </div>
    </div>
</div>

<!-- Модальное окно итоговых результатов -->
<div th:fragment="finalResultsModal" id="finalResultsModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 600px; padding: 2rem; text-align: center;">
        <i class="fas fa-crown" style="font-size: 4rem; color: #fbbf24; margin-bottom: 1rem;"></i>

        <h2 class="admin-title" style="font-size: 2rem; margin-bottom: 0.5rem;">¡Torneo Finalizado!</h2>

        <p class="text-lg" style="color: var(--admin-gray); margin-bottom: 1rem;">Rey de la Cancha:</p>

        <p id="finalWinnerName" class="text-3xl font-bold" style="color: var(--admin-primary); margin-bottom: 2rem;"></p>

        <div style="margin-top: 1.5rem;">
            <h3 class="admin-subtitle" style="margin-bottom: 1rem;">Clasificación Final</h3>
            <div id="finalLeaderboardContainer" style="max-height: 300px; overflow-y: auto;">
                <!-- Таблица будет вставлена через JS -->
            </div>
        </div>

        <div class="modal-actions" style="margin-top: 2rem;">
            <button class="btn btn-outline" style="width: 100%;" onclick="window.kingOfCourt.closeFinalModal()">Cerrar</button>
        </div>
    </div>
</div>

<!-- Модальное окно подтверждения -->
<div th:fragment="confirmModal" id="confirmModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 400px; padding: 2rem; text-align: center;">
        <i class="fas fa-question-circle" style="font-size: 3rem; color: var(--admin-warning); margin-bottom: 1rem;"></i>

        <h2 id="confirmModalTitle" class="text-xl font-bold" style="margin-bottom: 1rem;">Confirmar acción</h2>

        <p id="confirmModalText" class="text-gray-600" style="margin-bottom: 2rem;">¿Estás seguro?</p>

        <div style="display: flex; gap: 1rem;">
            <button class="btn btn-outline" style="flex: 1;" onclick="window.kingOfCourt.closeConfirmModal()">Cancelar</button>
            <button class="btn btn-danger" style="flex: 1;" onclick="window.kingOfCourt.executeConfirmAction()">Confirmar</button>
        </div>
    </div>
</div>

<script>
    // Добавляем методы для закрытия модальных окон в глобальную область
    window.closeResultModal = function() {
        if (window.kingOfCourt) {
            window.kingOfCourt.closeResultModal();
        }
    };

    window.closeHistoryModal = function() {
        if (window.kingOfCourt) {
            document.getElementById('historyModal').style.display = 'none';
        }
    };

    window.closeFinalModal = function() {
        if (window.kingOfCourt) {
            document.getElementById('finalResultsModal').style.display = 'none';
        }
    };

    window.closeConfirmModal = function() {
        if (window.kingOfCourt) {
            document.getElementById('confirmModal').style.display = 'none';
        }
    };
</script>
</body>
</html>
