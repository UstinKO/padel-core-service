spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE}
      minimum-idle: ${DB_MIN_IDLE}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

server:
  port: ${SERVER_PORT:8080}

app:
  base-url: ${APP_BASE_URL}
  email:
    from: ${EMAIL_FROM}
    sender-name: ${EMAIL_SENDER_NAME}

logging:
  file:
    name: ${LOG_FILE:/app/logs/application.log}
  logback:
    rollingpolicy:
      max-file-size: ${LOG_MAX_SIZE:10MB}
      max-history: ${LOG_MAX_HISTORY}