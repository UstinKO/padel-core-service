name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: chmod +x gradlew

      - name: Build jar
        run: ./gradlew clean bootJar

      - name: Copy jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: build/libs/*.jar
          target: /home/deploy/app/

      - name: Restart app with prod profile
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export SPRING_PROFILES_ACTIVE=prod
            export DB_URL='${{ secrets.DB_URL }}'
            export DB_USERNAME='${{ secrets.DB_USERNAME }}'
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            export DB_POOL_SIZE='${{ secrets.DB_POOL_SIZE }}'
            export DB_MIN_IDLE='${{ secrets.DB_MIN_IDLE }}'

            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export JWT_EXPIRATION='${{ secrets.JWT_EXPIRATION }}'
            export JWT_REFRESH_EXPIRATION='${{ secrets.JWT_REFRESH_EXPIRATION }}'

            export MAIL_HOST='${{ secrets.MAIL_HOST }}'
            export MAIL_PORT='${{ secrets.MAIL_PORT }}'
            export MAIL_USERNAME='${{ secrets.MAIL_USERNAME }}'
            export MAIL_PASSWORD='${{ secrets.MAIL_PASSWORD }}'

            export APP_BASE_URL='${{ secrets.APP_BASE_URL }}'
            export EMAIL_FROM='${{ secrets.EMAIL_FROM }}'
            export EMAIL_SENDER_NAME='${{ secrets.EMAIL_SENDER_NAME }}'

            pkill -f 'java -jar' || true
            nohup java -jar /home/deploy/app/*.jar > app.log 2>&1 &