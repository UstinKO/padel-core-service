name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR with version
        run: |
          mvn clean package -DskipTests
          echo "${{ github.sha }}" > target/version.txt
          echo "Build timestamp: $(date)" >> target/version.txt
          echo "Listing target directory:"
          ls -la target/

      - name: Copy jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/*.jar,target/version.txt"
          target: "/home/deploy/app/temp/"
          strip_components: 1

      - name: Deploy to server
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 120s
          command_timeout: 60s
          script: |
            set -e

            echo "🔧 Starting deployment process..."

            # Функция для отката
            rollback() {
              echo "⚠️ Rolling back to previous version..."
              if [ -f "/home/deploy/app/app.jar.backup" ]; then
                cp /home/deploy/app/app.jar.backup /home/deploy/app/app.jar
                echo "🔄 Restored previous JAR"
            
                cd /home/deploy/app
                docker compose build --no-cache padel-app
                docker compose up -d --no-deps padel-app
            
                echo "✅ Rollback completed"
              else
                echo "❌ No backup found for rollback"
              fi
            }

            # Сохраняем текущую версию для отката
            if [ -f "/home/deploy/app/app.jar" ]; then
              cp /home/deploy/app/app.jar /home/deploy/app/app.jar.backup
              echo "💾 Current version backed up"
            fi

            # Находим основной jar файл
            MAIN_JAR=$(ls /home/deploy/app/temp/padel-core-service-*.jar | grep -v "original" | head -1)

            if [ -z "$MAIN_JAR" ]; then
              echo "❌ No main JAR file found in temp directory!"
              echo "Contents of temp directory:"
              ls -la /home/deploy/app/temp/
              exit 1
            fi

            echo "📦 Found JAR file: $(basename $MAIN_JAR)"

            # Копируем новый JAR
            cp "$MAIN_JAR" /home/deploy/app/app.jar

            # Копируем version.txt
            if [ -f "/home/deploy/app/temp/version.txt" ]; then
              cp /home/deploy/app/temp/version.txt /home/deploy/app/version.txt
              echo "📄 Version file copied:"
              cat /home/deploy/app/version.txt
            fi

            # Сохраняем информацию о версии
            echo "$(basename $MAIN_JAR)" > /home/deploy/app/new_version.txt
            echo "Deployed at: $(date)" >> /home/deploy/app/new_version.txt

            # Переходим в директорию приложения
            cd /home/deploy/app

            # Пересобираем образ
            echo "🏗️ Building new Docker image..."
            if ! docker compose build --no-cache padel-app; then
              echo "❌ Docker build failed!"
              rollback
              exit 1
            fi

            # Перезапускаем приложение
            echo "🔄 Restarting application..."
            docker compose up -d --no-deps padel-app

            # Ждем запуска
            echo "⏳ Waiting for application to start (30 seconds)..."
            sleep 30

            # Проверяем, запустился ли контейнер
            if ! docker ps | grep -q padel-core-app; then
              echo "❌ Application container failed to start!"
              echo "📋 Container logs:"
              docker compose logs padel-app --tail=50
              rollback
              exit 1
            fi

            # Проверяем логи на наличие ошибок
            echo "🔍 Checking application logs for errors..."
            LOGS=$(docker compose logs padel-app --tail=50)
            
            # Ищем критические ошибки в логах
            if echo "$LOGS" | grep -E "ERROR|Exception|Failed to start|Application run failed|StackOverflowError|NullPointerException"; then
              echo "❌ Found errors in application logs!"
              echo "$LOGS" | grep -E "ERROR|Exception|Failed to start|Application run failed|StackOverflowError|NullPointerException" --color=always
              rollback
              exit 1
            fi

            # Проверяем health endpoint
            echo "🏥 Checking health endpoint..."
            HEALTH_CHECK=$(docker compose exec padel-app curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health 2>/dev/null || echo "failed")
            
            if [ "$HEALTH_CHECK" != "200" ]; then
              echo "❌ Health check failed with status: $HEALTH_CHECK"
              echo "📋 Application logs:"
              docker compose logs padel-app --tail=50
              rollback
              exit 1
            fi

            # Если всё хорошо, обновляем current_version
            mv /home/deploy/app/new_version.txt /home/deploy/app/current_version.txt
            echo "✅ New version is healthy!"

            # Удаляем бэкап после успешного деплоя
            rm -f /home/deploy/app/app.jar.backup
            echo "🧹 Backup removed"

            # Очищаем temp директорию
            rm -rf /home/deploy/app/temp/*
            echo "🧹 Temp directory cleaned"

            # Удаляем старые неиспользуемые образы
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment process completed successfully!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🏥 Running final health check..."
            
            cd /home/deploy/app
            
            # Проверяем статус контейнера
            if docker ps | grep -q padel-core-app; then
              echo "✅ Container is running"
              echo "📋 Current version:"
              cat /home/deploy/app/current_version.txt 2>/dev/null || echo "Unknown"
              echo "📋 Container status:"
              docker compose ps
              echo "📋 Last 20 lines of logs:"
              docker compose logs padel-app --tail=20
            else
              echo "❌ Container is not running!"
              docker compose ps
              docker compose logs padel-app --tail=50
              exit 1
            fi

      - name: Notify success
        if: success()
        run: |
          echo "🎉 DEPLOYMENT SUCCESSFUL! 🎉"
          echo "=================================="
          echo "✅ Application successfully deployed to production!"
          echo "📦 Version: $(cat target/version.txt 2>/dev/null | head -1 || echo 'unknown')"
          echo "🕐 Build time: $(date)"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "🌍 Server: ${{ secrets.SERVER_HOST }}"
          echo "=================================="

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ DEPLOYMENT FAILED! ❌"
          echo "=================================="
          echo "❌ Deployment to production failed!"
          echo "🕐 Time: $(date)"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "🌍 Server: ${{ secrets.SERVER_HOST }}"
          echo "=================================="
          echo "⚠️ Automatic rollback was performed"
          echo "Please check the logs above for details"
          exit 1